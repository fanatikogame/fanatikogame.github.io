<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANATIKO - Support & Legal</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Genel font Nunito (yuvarlak ve okunaklı), Başlıklar Baloo 2 olacak */
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 50px 30px;
            /* Köşeleri daha da yuvarlattık */
            border-radius: 40px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h1 {
            /* BubblyPop ismi için tam aradığın font */
            font-family: 'Baloo 2', cursive;
            font-size: 3.5em;
            margin-bottom: 5px;
            font-weight: 800;
            line-height: 1;
            text-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        h3 {
            font-family: 'Baloo 2', cursive;
            font-size: 1.6em;
            font-weight: 600;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.95);
        }

        p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            display: block;
            padding: 16px;
            background-color: #00e5ff;
            color: #1a2a6c;
            text-decoration: none;
            /* Buton köşelerini de iyice yuvarladık */
            border-radius: 20px;
            font-family: 'Baloo 2', cursive;
            font-weight: 800;
            font-size: 1.2em;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 15px rgba(0, 229, 255, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.5);
            background-color: #00fff2;
        }

        .email {
            display: inline-block;
            margin-top: 10px;
            color: #00e5ff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1em;
            border-bottom: 2px solid rgba(0, 229, 255, 0.3);
            transition: all 0.2s;
        }

        .email:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        .footer {
            margin-top: 35px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>FANATIKO</h1>
        <p>Welcome to the official support and information page for Fanatiko: Football Quiz.</p>
        
        <div>
            <h3>Contact Support</h3>
            <p>For any questions, issues, or feedback, reach out to us:</p>
            <a href="mailto:fanatikogame@gmail.com" class="email">fanatikogame@gmail.com</a>
        </div>

        <div class="links">
            <h3>Legal Documents</h3>
            <a href="privacy.html" class="btn">Privacy Policy</a>
            <a href="terms.html" class="btn">Terms of Use</a>
        </div>

        <div class="footer">
            <p>&copy; 2026 Fanatiko - All rights reserved.</p>
        </div>
    </div>
</body>
</html>
